<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>NOC - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #11111b; color: #cdd6f4; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: #1e1e2e; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; border: 1px solid #45475a; }
        .login-box h2 { text-align: center; color: #89b4fa; margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 5px; color: #bac2de; font-size: 0.9em; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #45475a; background: #313244; color: #cdd6f4; border-radius: 4px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #89b4fa; color: #11111b; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 1em; transition: 0.3s; }
        .btn-login:hover { background: #74c7ec; }
        .flash-msg { background: #f38ba8; color: #11111b; padding: 10px; border-radius: 4px; text-align: center; margin-bottom: 20px; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2><i class="fa-solid fa-shield-halved"></i> NOC Acesso</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-msg">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" name="usuario" required placeholder="Ex: admin">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" name="senha" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Entrar no Sistema</button>
        </form>
    </div>
</body>
</html>
